<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Apply Form </title>
  <style>
    :root{--accent:#06b6d4;--muted:#94a3b8}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,'Noto Sans Thai','Helvetica Neue',Arial;min-height:100vh;display:flex;align-items:center;justify-content:center;background:url('https://www.scimath.org/images/stories/flexicontent/item_9445_field_65/l_2018-11-19_02.02.21.JPG') center/cover no-repeat;color:#e6eef6}
    .wrap{width:100%;max-width:960px;padding:24px;background:rgba(0,0,0,0.6);border-radius:16px;backdrop-filter:blur(6px)}
    .grid{display:grid;grid-template-columns:1fr 420px;gap:28px;align-items:start}
    .card{background:rgba(0,0,0,0.5);border-radius:12px;padding:22px;box-shadow:0 6px 18px rgba(0,0,0,0.6)}
    h1{margin:0 0 8px;font-size:20px}
    p.lead{color:var(--muted);margin:0 0 18px}
    form{display:flex;flex-direction:column;gap:12px}
    label{font-size:12px;color:var(--muted)}
    input[type="text"],input[type="password"]{padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:inherit}
    .actions{display:flex;gap:8px;align-items:center}
    button.primary{background:var(--accent);border:none;padding:10px 14px;border-radius:10px;color:#021025;font-weight:600;cursor:pointer}
    button.ghost{background:transparent;border:1px solid rgba(255,255,255,0.3);padding:8px 10px;border-radius:8px;color:var(--muted);cursor:pointer}
    .downloads{display:flex;flex-direction:column;gap:12px}
    .dl-item{display:flex;align-items:center;justify-content:space-between;padding:10px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1)}
    .dl-left{display:flex;gap:12px;align-items:center}
    .file-ico{width:44px;height:44px;border-radius:8px;background:linear-gradient(180deg,#063143,#035c6a);display:flex;align-items:center;justify-content:center;font-weight:700}
    .meta{line-height:1}
    .name{font-weight:600}
    .muted{color:var(--muted);font-size:13px}
    .download-btn{padding:8px 10px;border-radius:8px;border:none;cursor:pointer}
    .note{font-size:13px;color:var(--muted);margin-top:10px}
    .toast{position:fixed;right:20px;bottom:20px;background:#062b32;padding:10px 14px;border-radius:10px;color:#dff7fb;border:1px solid rgba(255,255,255,0.03);box-shadow:0 6px 20px rgba(0,0,0,0.6);display:none}
    @media (max-width:900px){.grid{grid-template-columns:1fr;}.wrap{padding:16px}.card{padding:16px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <div class="card">
        <h1>เข้าสู่ระบบ</h1>
        <p class="lead">กรุณาล็อกอินเพื่อดาวน์โหลดไฟล์ — หรือคลิกดาวน์โหลดถ้าต้องการไฟล์สาธารณะ</p>
        <form id="loginForm" autocomplete="off">
          <div>
            <label for="user">ชื่อผู้ใช้</label>
            <input id="user" name="user" type="text" placeholder="ใส่ชื่อผู้ใช้" required />
          </div>
          <div>
            <label for="pass">รหัสผ่าน</label>
            <input id="pass" name="admin" type="password" placeholder="admin" required />
          </div>
          <div class="actions">
            <button type="submit" class="primary">ล็อกอิน</button>
            <button type="button" id="guestBtn" class="ghost">ดาวน์โหลดเป็นผู้เยี่ยมชม</button>
          </div>
          <p class="note">หมายเหตุ: หน้านี้เป็น HTML ตัวอย่าง — การล็อกอินจริงต้องใช้ระบบฝั่งเซิร์ฟเวอร์</p>
        </form>
      </div>
      <div class="card">
        <h1>ดาวน์โหลดไฟล์ (3 ลิงก์)</h1>
        <p class="lead">คลิกปุ่มเพื่อดาวน์โหลดไฟล์</p>
        <div class="downloads" id="downloads"></div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast">พร้อมดาวน์โหลด</div>
  <script>
    const files = [
      {id:'file1', title:'Notrue 25.01.91.16', url:'https://drive.google.com/file/d/19PbXVWUlZgVjdkj3cF__TgXnpEJEEo-K/view?usp=drive_link', size:'Google Drive'},
      {id:'file2', title:'ทรูเดิม 25.01.91.16', url:'https://ott-download.trueid.net/atv/TrueDmpOTT-UI-user-25-01-91-16.apk', size:'APK File'},
      {id:'file3', title:'ทรูโคลน (ยังไม่เปิดให้ดาวน์โหลด)', url:'#', size:'รออัปเดต'}
      {id:'file4', title:'ทรูโคลน 25.01.91.16 เบต้า ', url:'#', size:'รออัปเดต'}
    ];
    const dlContainer=document.getElementById('downloads');
    const toast=document.getElementById('toast');
    function showToast(text){toast.textContent=text;toast.style.display='block';clearTimeout(window._toastTimer);window._toastTimer=setTimeout(()=>toast.style.display='none',2400)}
    function createItem(f){
      const wrap=document.createElement('div');wrap.className='dl-item';
      const left=document.createElement('div');left.className='dl-left';
      const ico=document.createElement('div');ico.className='file-ico';ico.textContent=f.title.slice(0,2).toUpperCase();
      const meta=document.createElement('div');meta.className='meta';
      const name=document.createElement('div');name.className='name';name.textContent=f.title;
      const sm=document.createElement('div');sm.className='muted';sm.textContent=f.size;
      meta.appendChild(name);meta.appendChild(sm);
      left.appendChild(ico);left.appendChild(meta);
      const btn=document.createElement('button');btn.className='download-btn';btn.textContent='ดาวน์โหลด';
      btn.addEventListener('click',e=>{
        e.preventDefault();
        if(f.url==='#'){showToast('ลิงก์ยังไม่เปิดให้ดาวน์โหลด');return;}
        const a=document.createElement('a');a.href=f.url;a.target='_blank';a.rel='noopener';a.click();
        showToast('เปิดลิงก์ดาวน์โหลด: '+f.title);
      });
      wrap.appendChild(left);wrap.appendChild(btn);return wrap;
    }
    files.forEach(f=>dlContainer.appendChild(createItem(f)));
    document.getElementById('loginForm').addEventListener('submit',e=>{e.preventDefault();const u=document.getElementById('user').value.trim();if(!u){showToast('กรุณากรอกชื่อผู้ใช้');return;}showToast('ล็อกอินสำเร็จ (จำลอง): '+u)});
    document.getElementById('guestBtn').addEventListener('click',()=>{showToast('โหมดผู้เยี่ยมชมพร้อมใช้งาน')});
  </script>
</body>
</html>
