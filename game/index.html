<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Dodge Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1f2933, #020617);
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game-wrap {
      text-align: center;
      padding: 16px 20px 24px;
      background: rgba(15, 23, 42, 0.95);
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.4);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 10px;
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .info-bar span strong {
      color: #22c55e;
    }

    #startBtn {
      padding: 6px 14px;
      font-size: 14px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #020617;
      font-weight: 600;
      box-shadow: 0 8px 20px rgba(22, 163, 74, 0.5);
      transition: transform 0.1s ease, box-shadow 0.1s ease, opacity 0.2s ease;
    }

    #startBtn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(22, 163, 74, 0.6);
    }

    #startBtn:active:not(:disabled) {
      transform: translateY(1px);
      box-shadow: 0 4px 12px rgba(22, 163, 74, 0.4);
    }

    #startBtn:disabled {
      opacity: 0.5;
      cursor: default;
      box-shadow: none;
    }

    .hint {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 10px;
    }

    #gameArea {
      position: relative;
      width: 400px;
      height: 400px;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid #4b5563;
      background:
        radial-gradient(circle at 10% 0%, rgba(56,189,248,0.16), transparent 55%),
        radial-gradient(circle at 90% 80%, rgba(52,211,153,0.16), transparent 55%),
        #020617;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
    }

    #player {
      position: absolute;
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #22c55e, #a3e635);
      border-radius: 10px;
      bottom: 0;
      left: 180px;
      box-shadow: 0 0 18px rgba(34, 197, 94, 0.9);
    }

    .enemy {
      position: absolute;
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #ef4444, #f97316);
      border-radius: 10px;
      box-shadow: 0 0 16px rgba(248, 113, 113, 0.9);
    }

    .game-over-banner {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(15,23,42,0.3), rgba(15,23,42,0.95));
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #e5e7eb;
      z-index: 10;
    }

    .game-over-banner.active {
      display: flex;
    }

    .game-over-banner h2 {
      font-size: 22px;
      margin-bottom: 6px;
    }

    .game-over-banner p {
      font-size: 14px;
      margin-bottom: 4px;
    }

    .game-over-banner .over-score {
      color: #22c55e;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .game-over-banner small {
      font-size: 11px;
      color: #9ca3af;
    }

    @media (max-width: 460px) {
      #gameArea {
        width: 320px;
        height: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="game-wrap">
    <h1>Simple Dodge Game</h1>
    <div class="subtitle">หลบกล่องสีแดงให้นานที่สุด!</div>

    <div class="info-bar">
      <span>Score: <strong id="score">0</strong></span>
      <span>Best: <strong id="bestScore">0</strong></span>
    </div>

    <button id="startBtn">Start Game</button>
    <div class="hint">
      ใช้ปุ่ม ◀ ▶ หรือ A / D เพื่อเคลื่อนที่
    </div>

    <div id="gameArea">
      <div id="player"></div>

      <div id="gameOverBanner" class="game-over-banner">
        <h2>Game Over</h2>
        <p class="over-score">Score: <span id="finalScore">0</span></p>
        <p>กดปุ่ม Start เพื่อเล่นอีกครั้ง</p>
        <small>Tip: อยู่กลางๆ แล้วค่อยหลบตอนใกล้ถึงจะง่ายขึ้น</small>
      </div>
    </div>
  </div>

  <script>
    // ====== Basic DOM references ======
    const gameArea = document.getElementById('gameArea');
    const player   = document.getElementById('player');
    const scoreEl  = document.getElementById('score');
    const bestEl   = document.getElementById('bestScore');
    const startBtn = document.getElementById('startBtn');

    const gameOverBanner = document.getElementById('gameOverBanner');
    const finalScoreEl   = document.getElementById('finalScore');

    // ====== Game constants ======
    const AREA_WIDTH   = 400;
    const AREA_HEIGHT  = 400;
    const PLAYER_SIZE  = 40;
    const ENEMY_SIZE   = 40;

    // ====== Game state ======
    let playerX        = (AREA_WIDTH - PLAYER_SIZE) / 2;
    let keys           = { left: false, right: false };
    let isPlaying      = false;
    let enemies        = [];
    let spawnTimer     = 0;
    let spawnInterval  = 800; // milliseconds
    let lastTime       = 0;
    let score          = 0;
    let bestScore      = Number(localStorage.getItem('simpleDodgeBest') || 0);
    let animationId    = null;

    bestEl.textContent = bestScore;

    // ====== Controls ======
    document.addEventListener('keydown', (e) => {
      if (e.code === 'ArrowLeft' || e.code === 'KeyA')  keys.left  = true;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
    });

    document.addEventListener('keyup', (e) => {
      if (e.code === 'ArrowLeft' || e.code === 'KeyA')  keys.left  = false;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
    });

    startBtn.addEventListener('click', startGame);

    // ====== Start / Reset ======
    function startGame() {
      isPlaying     = true;
      score         = 0;
      spawnTimer    = 0;
      spawnInterval = 800; // reset difficulty
      lastTime      = performance.now();
      scoreEl.textContent = '0';

      // reset player position
      playerX = (AREA_WIDTH - PLAYER_SIZE) / 2;
      player.style.left = playerX + 'px';

      // remove old enemies
      enemies.forEach(e => e.el.remove());
      enemies = [];

      // hide game over banner
      gameOverBanner.classList.remove('active');

      startBtn.disabled = true;

      if (animationId !== null) {
        cancelAnimationFrame(animationId);
      }
      animationId = requestAnimationFrame(gameLoop);
    }

    // ====== Main loop ======
    function gameLoop(timestamp) {
      if (!isPlaying) return;

      const dt = timestamp - lastTime; // ms
      lastTime = timestamp;

      updatePlayer(dt);
      updateEnemies(dt);

      // spawn new enemy
      spawnTimer += dt;
      if (spawnTimer >= spawnInterval) {
        spawnTimer = 0;
        spawnEnemy();

        // make game a bit harder over time
        spawnInterval = Math.max(350, spawnInterval - 5);
      }

      animationId = requestAnimationFrame(gameLoop);
    }

    // ====== Player update ======
    function updatePlayer(dt) {
      const speed = 0.4 * dt; // px per ms (~400 px/s)

      if (keys.left)  playerX -= speed;
      if (keys.right) playerX += speed;

      if (playerX < 0) playerX = 0;
      if (playerX > AREA_WIDTH - PLAYER_SIZE) {
        playerX = AREA_WIDTH - PLAYER_SIZE;
      }

      player.style.left = playerX + 'px';
    }

    // ====== Enemy spawn ======
    function spawnEnemy() {
      const enemyEl = document.createElement('div');
      enemyEl.className = 'enemy';

      const maxX = AREA_WIDTH - ENEMY_SIZE;
      const x    = Math.floor(Math.random() * (maxX + 1));
      const y    = -ENEMY_SIZE;

      enemyEl.style.left = x + 'px';
      enemyEl.style.top  = y + 'px';

      gameArea.appendChild(enemyEl);

      enemies.push({
        el: enemyEl,
        x: x,
        y: y,
        size: ENEMY_SIZE,
        speed: 0.25 + Math.random() * 0.25 // falling speed
      });
    }

    // ====== Enemy update & collision ======
    function updateEnemies(dt) {
      const playerTop    = AREA_HEIGHT - PLAYER_SIZE;
      const playerBottom = AREA_HEIGHT;
      const playerLeft   = playerX;
      const playerRight  = playerX + PLAYER_SIZE;

      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        enemy.y += enemy.speed * dt;
        enemy.el.style.top = enemy.y + 'px';

        const enemyTop    = enemy.y;
        const enemyBottom = enemy.y + enemy.size;
        const enemyLeft   = enemy.x;
        const enemyRight  = enemy.x + enemy.size;

        // collision check (AABB)
        if (
          playerLeft < enemyRight &&
          playerRight > enemyLeft &&
          playerTop < enemyBottom &&
          playerBottom > enemyTop
        ) {
          endGame();
          return;
        }

        // passed bottom
        if (enemy.y > AREA_HEIGHT) {
          enemy.el.remove();
          enemies.splice(i, 1);

          score++;
          scoreEl.textContent = score;

          if (score > bestScore) {
            bestScore = score;
            bestEl.textContent = bestScore;
            localStorage.setItem('simpleDodgeBest', bestScore);
          }
        }
      }
    }

    // ====== Game Over ======
    function endGame() {
      isPlaying = false;
      startBtn.disabled = false;
      finalScoreEl.textContent = score;
      gameOverBanner.classList.add('active');
    }
  </script>
</body>
</html>
