<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ChatGPT Image (Clone UI)</title>
  <style>
    :root{
      --bg:#0b0f14;
      --panel:#0f141b;
      --panel2:#111827;
      --panel3:#0f172a;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --border:rgba(255,255,255,.08);
      --hover:rgba(255,255,255,.06);
      --brand:#10a37f;
      --danger:#ef4444;
      --radius:14px;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans Thai", Arial;
    }
    *{box-sizing:border-box}
    html,body{height:100%; margin:0; background:var(--bg); color:var(--text);}

    /* Layout */
    .app{height:100%; display:flex; overflow:hidden}
    .sidebar{
      width:300px; min-width:260px; max-width:340px;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border-right:1px solid var(--border);
      padding:12px;
      display:flex; flex-direction:column; gap:12px;
    }
    .main{
      flex:1; display:flex; flex-direction:column; min-width:0;
      background: radial-gradient(800px 500px at 30% 0%, rgba(16,163,127,.12), transparent 60%),
                  radial-gradient(800px 500px at 80% 0%, rgba(59,130,246,.10), transparent 60%),
                  var(--bg);
    }

    /* Sidebar header */
    .sbTop{display:flex; gap:10px; align-items:center}
    .newChat{
      width:100%;
      display:flex; gap:10px; align-items:center; justify-content:center;
      padding:10px 12px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--border);
      border-radius:12px;
      cursor:pointer;
      user-select:none;
    }
    .newChat:hover{background:rgba(255,255,255,.06)}
    .plus{
      width:18px; height:18px; border-radius:6px;
      border:1px solid var(--border);
      display:grid; place-items:center;
      font-weight:700; color:var(--text);
      background:rgba(255,255,255,.03);
    }

    .sbSectionTitle{
      font-size:12px; color:var(--muted);
      padding:0 4px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .sbList{flex:1; overflow:auto; padding-right:4px}
    .chatItem{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 10px;
      border-radius:12px;
      cursor:pointer;
      border:1px solid transparent;
    }
    .chatItem:hover{background:var(--hover)}
    .chatItem.active{
      background:rgba(255,255,255,.06);
      border-color:rgba(255,255,255,.10);
    }
    .chatTitle{
      min-width:0;
      font-size:13px;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .delBtn{
      border:none; background:transparent; color:var(--muted);
      cursor:pointer; padding:6px 8px; border-radius:10px;
    }
    .delBtn:hover{background:rgba(255,255,255,.06); color:#fff}

    .sbBottom{
      border-top:1px solid var(--border);
      padding-top:10px;
      display:flex; flex-direction:column; gap:8px;
    }
    .pillRow{display:flex; gap:8px; flex-wrap:wrap}
    .pill{
      display:inline-flex; gap:8px; align-items:center;
      padding:8px 10px;
      border:1px solid var(--border);
      border-radius:999px;
      background:rgba(255,255,255,.03);
      font-size:12px;
      color:var(--muted);
    }
    .pill select, .pill input{
      background:transparent;
      border:none;
      color:var(--text);
      outline:none;
      font-size:12px;
    }
    .pill input{width:40px}

    /* Main header */
    .topbar{
      height:56px;
      display:flex; align-items:center; justify-content:center;
      padding:0 16px;
      border-bottom:1px solid var(--border);
      background:rgba(11,15,20,.75);
      backdrop-filter: blur(10px);
      position:sticky; top:0; z-index:10;
    }
    .topbarInner{
      width:min(900px, 100%);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .brand{
      display:flex; gap:10px; align-items:center;
      font-weight:700;
      letter-spacing:.2px;
    }
    .dot{
      width:10px; height:10px; border-radius:999px; background:var(--brand);
      box-shadow:0 0 0 6px rgba(16,163,127,.14);
    }
    .sub{
      font-size:12px; color:var(--muted); font-weight:500;
    }

    /* Chat area */
    .chatWrap{
      flex:1; overflow:auto;
      padding:18px 16px 110px;
      display:flex; justify-content:center;
    }
    .chat{
      width:min(900px, 100%);
      display:flex; flex-direction:column;
      gap:14px;
    }
    .msgRow{display:flex; gap:12px}
    .avatar{
      width:28px; height:28px; border-radius:10px;
      display:grid; place-items:center;
      background:rgba(255,255,255,.05);
      border:1px solid var(--border);
      flex:0 0 auto;
      margin-top:2px;
      color:var(--muted);
      font-weight:800;
      font-size:12px;
    }
    .avatar.user{
      background:rgba(16,163,127,.12);
      border-color:rgba(16,163,127,.25);
      color:#bff3e5;
    }
    .bubble{
      flex:1;
      background:rgba(255,255,255,.03);
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px 12px;
      box-shadow:0 6px 20px rgba(0,0,0,.18);
    }
    .whoLine{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      margin-bottom:6px;
      color:var(--muted);
      font-size:12px;
    }
    .text{white-space:pre-wrap; line-height:1.55; font-size:14px}
    .imgGrid{
      margin-top:10px;
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap:10px;
    }
    .imgCard{
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.18);
      position:relative;
    }
    .imgCard img{display:block; width:100%; height:auto}
    .imgActions{
      position:absolute; right:10px; top:10px;
      display:flex; gap:8px;
    }
    .iconBtn{
      border:none; cursor:pointer;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(0,0,0,.55);
      color:#fff;
      font-size:12px;
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(6px);
    }
    .iconBtn:hover{background:rgba(0,0,0,.70)}

    /* Composer */
    .composer{
      position:fixed; left:300px; right:0; bottom:0;
      padding:14px 16px 16px;
      background:linear-gradient(180deg, rgba(11,15,20,0), rgba(11,15,20,.85) 22%, rgba(11,15,20,.95));
      display:flex; justify-content:center;
      pointer-events:none;
    }
    .composerInner{
      width:min(900px, 100%);
      pointer-events:auto;
    }
    .inputBar{
      display:flex; gap:10px; align-items:flex-end;
      background:rgba(255,255,255,.03);
      border:1px solid var(--border);
      border-radius:16px;
      padding:10px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }
    textarea{
      width:100%;
      min-height:44px;
      max-height:160px;
      resize:none;
      border:none;
      outline:none;
      background:transparent;
      color:var(--text);
      font-size:14px;
      line-height:1.45;
      padding:8px 6px;
    }
    .btn{
      border:none;
      border-radius:12px;
      padding:10px 12px;
      cursor:pointer;
      font-weight:700;
      color:#081015;
      background:var(--brand);
      min-width:92px;
    }
    .btn:disabled{opacity:.6; cursor:not-allowed}
    .btnGhost{
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      color:var(--text);
      min-width:72px;
    }
    .btnGhost:hover{background:rgba(255,255,255,.06)}
    .hint{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
      text-align:center;
    }
    .spinner{
      width:14px; height:14px; border-radius:999px;
      border:2px solid rgba(0,0,0,.25);
      border-top-color:rgba(0,0,0,.75);
      display:inline-block;
      animation:spin .9s linear infinite;
      vertical-align:-2px;
      margin-right:8px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Responsive */
    @media (max-width: 880px){
      .sidebar{display:none}
      .composer{left:0}
    }
  </style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sbTop">
      <div class="newChat" id="newChatBtn">
        <div class="plus">+</div>
        <div style="font-weight:700">New chat</div>
      </div>
    </div>

    <div class="sbSectionTitle">
      <span>Chats</span>
      <button class="delBtn" id="clearAllBtn" title="Clear all chats">Clear</button>
    </div>

    <div class="sbList" id="chatList"></div>

    <div class="sbBottom">
      <div class="pillRow">
        <div class="pill">Model
          <select id="model">
            <option value="gpt-image-1.5">gpt-image-1.5</option>
            <option value="gpt-image-1">gpt-image-1</option>
          </select>
        </div>
        <div class="pill">Size
          <select id="size">
            <option value="1024x1024">1024×1024</option>
            <option value="1536x1024">1536×1024</option>
            <option value="1024x1536">1024×1536</option>
          </select>
        </div>
        <div class="pill">Quality
          <select id="quality">
            <option value="auto">auto</option>
            <option value="high">high</option>
            <option value="medium">medium</option>
            <option value="low">low</option>
          </select>
        </div>
        <div class="pill">N
          <input id="n" type="number" min="1" max="4" value="1" />
        </div>
      </div>
      <div class="pill" style="justify-content:space-between">
        <span>Local history: ON</span>
        <span style="color:var(--muted)">v1</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <section class="main">
    <div class="topbar">
      <div class="topbarInner">
        <div class="brand"><span class="dot"></span> Image Chat <span class="sub">Chat-like UI</span></div>
        <div class="sub" id="chatTitleTop">New chat</div>
      </div>
    </div>

    <div class="chatWrap" id="chatWrap">
      <div class="chat" id="chat"></div>
    </div>

    <div class="composer">
      <div class="composerInner">
        <div class="inputBar">
          <textarea id="prompt" placeholder="Message Image Chat… (Enter ส่ง / Shift+Enter ขึ้นบรรทัดใหม่)"></textarea>
          <button class="btn btnGhost" id="stopBtn" disabled>Stop</button>
          <button class="btn" id="sendBtn">Send</button>
        </div>
        <div class="hint">Tip: พิมพ์ prompt แล้ว Enter เพื่อส่ง • รูปจะถูกบันทึกในประวัติของแชทนี้</div>
      </div>
    </div>
  </section>
</div>

<script>
  // ====== Simple local chat storage ======
  const LS_KEY = "imgchat_clone_v1";

  const $ = (id) => document.getElementById(id);

  const ui = {
    chat: $("chat"),
    chatWrap: $("chatWrap"),
    prompt: $("prompt"),
    sendBtn: $("sendBtn"),
    stopBtn: $("stopBtn"),
    newChatBtn: $("newChatBtn"),
    chatList: $("chatList"),
    clearAllBtn: $("clearAllBtn"),
    chatTitleTop: $("chatTitleTop"),
    model: $("model"),
    size: $("size"),
    quality: $("quality"),
    n: $("n"),
  };

  const state = {
    chats: [],
    activeChatId: null,
    aborter: null
  };

  function uid(){ return crypto.randomUUID(); }

  function load(){
    try{
      const raw = localStorage.getItem(LS_KEY);
      if(!raw) return;
      const parsed = JSON.parse(raw);
      if(parsed && Array.isArray(parsed.chats)){
        state.chats = parsed.chats;
        state.activeChatId = parsed.activeChatId || (parsed.chats[0]?.id ?? null);
      }
    }catch{}
  }

  function save(){
    localStorage.setItem(LS_KEY, JSON.stringify({
      chats: state.chats,
      activeChatId: state.activeChatId
    }));
  }

  function activeChat(){
    return state.chats.find(c => c.id === state.activeChatId) || null;
  }

  function createChat(title="New chat"){
    const chat = { id: uid(), title, createdAt: Date.now(), messages: [] };
    state.chats.unshift(chat);
    state.activeChatId = chat.id;
    save();
    renderAll();
    return chat;
  }

  function deleteChat(id){
    state.chats = state.chats.filter(c => c.id !== id);
    if(state.activeChatId === id){
      state.activeChatId = state.chats[0]?.id ?? null;
    }
    save();
    renderAll();
  }

  function clearAll(){
    state.chats = [];
    state.activeChatId = null;
    save();
    renderAll();
  }

  function setTitleFromPrompt(chat, prompt){
    const t = (prompt || "").trim().slice(0, 36);
    if(!t) return;
    if(chat.title === "New chat") chat.title = t;
  }

  function nowTime(){
    const d = new Date();
    return d.toLocaleString("th-TH", { hour:"2-digit", minute:"2-digit" });
  }

  function escapeHtml(s){
    return (s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
  }

  function scrollBottom(){
    requestAnimationFrame(() => {
      ui.chatWrap.scrollTop = ui.chatWrap.scrollHeight;
    });
  }

  function renderSidebar(){
    ui.chatList.innerHTML = state.chats.map(c => `
      <div class="chatItem ${c.id===state.activeChatId ? "active":""}" data-id="${c.id}">
        <div class="chatTitle">${escapeHtml(c.title)}</div>
        <button class="delBtn" data-del="${c.id}" title="Delete">🗑</button>
      </div>
    `).join("") || `<div style="color:var(--muted);font-size:13px;padding:10px 6px;">No chats yet</div>`;

    ui.chatTitleTop.textContent = activeChat()?.title ?? "New chat";
  }

  function renderChat(){
    const chat = activeChat();
    if(!chat){
      ui.chat.innerHTML = `
        <div style="color:var(--muted); text-align:center; padding:70px 10px;">
          <div style="font-size:18px; color:var(--text); font-weight:800; margin-bottom:8px;">Start a new image chat</div>
          <div>พิมพ์ prompt ด้านล่าง แล้วกด Send</div>
        </div>`;
      return;
    }

    ui.chat.innerHTML = chat.messages.map(m => {
      const isUser = m.role === "user";
      const av = isUser ? "You" : "AI";
      const avCls = isUser ? "avatar user" : "avatar";
      const imgs = (m.images || []).length ? `
        <div class="imgGrid">
          ${(m.images || []).map((src, idx) => `
            <div class="imgCard">
              <div class="imgActions">
                <button class="iconBtn" data-open="${escapeHtml(src)}">Open</button>
                <button class="iconBtn" data-dl="${escapeHtml(src)}" data-name="image_${idx+1}.png">Download</button>
              </div>
              <img src="${escapeHtml(src)}" alt="generated" loading="lazy"/>
            </div>
          `).join("")}
        </div>` : "";

      return `
        <div class="msgRow">
          <div class="${avCls}">${av}</div>
          <div class="bubble">
            <div class="whoLine">
              <span>${isUser ? "You" : "Image AI"}</span>
              <span>${escapeHtml(m.time || "")}</span>
            </div>
            <div class="text">${escapeHtml(m.text || "")}</div>
            ${imgs}
          </div>
        </div>
      `;
    }).join("");

    scrollBottom();
  }

  function renderAll(){
    renderSidebar();
    renderChat();
  }

  // ====== Image generation ======
  function setBusy(on){
    ui.sendBtn.disabled = on;
    ui.stopBtn.disabled = !on;
    ui.sendBtn.innerHTML = on ? `<span class="spinner"></span>Sending` : "Send";
  }

  async function send(){
    const prompt = ui.prompt.value.trim();
    if(!prompt) return;

    let chat = activeChat();
    if(!chat) chat = createChat("New chat");

    // User message
    chat.messages.push({ role:"user", text: prompt, time: nowTime() });
    setTitleFromPrompt(chat, prompt);
    ui.prompt.value = "";
    save();
    renderAll();

    // Bot placeholder
    const botMsg = { role:"assistant", text:"Generating image…", time: nowTime(), images: [] };
    chat.messages.push(botMsg);
    save();
    renderAll();

    // Abort controller
    state.aborter = new AbortController();
    setBusy(true);

    try{
      const payload = {
        prompt,
        model: ui.model.value,
        size: ui.size.value,
        quality: ui.quality.value,
        n: Math.max(1, Math.min(4, parseInt(ui.n.value || "1", 10)))
      };

      const res = await fetch("/api/image", {
        method: "POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify(payload),
        signal: state.aborter.signal
      });

      if(!res.ok){
        const t = await res.text().catch(()=> "");
        throw new Error(`API ${res.status}: ${t || res.statusText}`);
      }

      const data = await res.json();
      const images = Array.isArray(data.images) ? data.images : [];

      botMsg.text = images.length ? "Done ✅" : "Done ✅ (no image returned)";
      botMsg.images = images;

      save();
      renderAll();
    }catch(e){
      botMsg.text = (e.name === "AbortError")
        ? "Stopped."
        : ("Error: " + (e.message || e));
      botMsg.images = [];
      save();
      renderAll();
    }finally{
      setBusy(false);
      state.aborter = null;
    }
  }

  function stop(){
    if(state.aborter) state.aborter.abort();
  }

  // Download helper (for data URL / normal URL)
  async function downloadImage(src, filename="image.png"){
    try{
      const a = document.createElement("a");
      a.href = src;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
    }catch{}
  }

  // ====== Events ======
  ui.sendBtn.addEventListener("click", send);
  ui.stopBtn.addEventListener("click", stop);

  ui.prompt.addEventListener("keydown", (e) => {
    if(e.key === "Enter" && !e.shiftKey){
      e.preventDefault();
      send();
    }
  });

  ui.newChatBtn.addEventListener("click", () => createChat("New chat"));

  ui.clearAllBtn.addEventListener("click", () => {
    if(confirm("Clear all chats?")) clearAll();
  });

  ui.chatList.addEventListener("click", (e) => {
    const del = e.target?.getAttribute?.("data-del");
    if(del){
      e.stopPropagation();
      if(confirm("Delete this chat?")) deleteChat(del);
      return;
    }
    const item = e.target.closest?.(".chatItem");
    if(item){
      state.activeChatId = item.getAttribute("data-id");
      save();
      renderAll();
    }
  });

  ui.chat.addEventListener("click", (e) => {
    const open = e.target?.getAttribute?.("data-open");
    const dl = e.target?.getAttribute?.("data-dl");
    if(open){
      window.open(open, "_blank");
    }
    if(dl){
      const name = e.target?.getAttribute?.("data-name") || "image.png";
      downloadImage(dl, name);
    }
  });

  // ====== Init ======
  load();
  if(!state.activeChatId && state.chats.length){
    state.activeChatId = state.chats[0].id;
  }
  renderAll();
</script>
</body>
</html>
