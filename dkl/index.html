<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>PAT DataCenter</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        min-height: 100vh;
        background: url('https://media.atime.live/editor/content/92df98cd-2f90-493a-a8b2-15086ad83e11.jpeg')
                    center/cover fixed no-repeat;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
        color: #fff;
    }

    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at top, rgba(255,255,255,0.1), transparent 50%),
                    linear-gradient(to bottom right, rgba(0,0,0,0.75), rgba(0,0,0,0.85));
        z-index: 0;
    }

    .login-wrapper {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 420px;
        animation: slideUp 0.5s ease-out;
    }

    .title-area {
        text-align: center;
        margin-bottom: 14px;
    }

    .title-area h1 {
        font-size: 26px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        font-weight: 700;
    }

    .title-area p {
        font-size: 13px;
        opacity: 0.8;
        margin-top: 4px;
    }

    .login-box {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        padding: 22px 20px 18px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        border: 1px solid rgba(255,255,255,0.16);
        backdrop-filter: blur(16px);
    }

    .login-box h2 {
        font-size: 18px;
        margin-bottom: 8px;
        text-align: center;
    }

    .login-box .hint {
        font-size: 12px;
        opacity: 0.75;
        margin-bottom: 18px;
        text-align: center;
    }

    .field-label {
        font-size: 13px;
        margin-bottom: 6px;
        opacity: 0.9;
        text-align: left;
    }

    .input-wrap {
        position: relative;
    }

    input[type="password"] {
        width: 100%;
        padding: 12px 40px 12px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.35);
        background: rgba(0,0,0,0.25);
        color: #fff;
        font-size: 15px;
        outline: none;
        transition: 0.2s;
    }

    input[type="password"]::placeholder {
        color: rgba(255,255,255,0.5);
    }

    input[type="password"]:focus {
        border-color: #4da3ff;
        box-shadow: 0 0 0 1px rgba(77,163,255,0.7);
        background: rgba(0,0,0,0.4);
    }

    .input-icon {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 16px;
        opacity: 0.7;
        pointer-events: none;
    }

    button.main-btn {
        width: 100%;
        padding: 12px;
        margin-top: 16px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, #4da3ff, #38d4ff);
        color: #00121f;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 10px 25px rgba(0, 140, 255, 0.6);
        transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    button.main-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 30px rgba(0, 140, 255, 0.75);
        opacity: 0.95;
    }

    button.main-btn:active {
        transform: translateY(1px) scale(0.99);
        box-shadow: 0 6px 16px rgba(0, 140, 255, 0.7);
    }

    .footer {
        margin-top: 14px;
        text-align: center;
        font-size: 11px;
        opacity: 0.65;
    }

    /* POPUP */
    #popup {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.65);
        justify-content: center;
        align-items: center;
        z-index: 5;
    }

    .popup-box {
        background: rgba(18,18,18,0.96);
        border-radius: 18px;
        padding: 22px 18px 18px;
        width: 90%;
        max-width: 360px;
        box-shadow: 0 16px 40px rgba(0,0,0,0.7);
        border: 1px solid rgba(255,255,255,0.12);
        color: #f5f5f5;
        text-align: left;
        animation: popIn 0.3s ease-out;
    }

    .popup-box h3 {
        margin-bottom: 10px;
        font-size: 18px;
        text-align: center;
    }

    .info-row {
        font-size: 13px;
        margin-top: 6px;
    }

    .info-row b {
        opacity: 0.8;
    }

    .popup-actions {
        margin-top: 18px;
        display: flex;
        gap: 8px;
    }

    .popup-actions a,
    .popup-actions button {
        flex: 1;
    }

    .download-btn {
        width: 100%;
        padding: 10px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, #1dd1a1, #10ac84);
        color: #00120a;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 10px 25px rgba(16,172,132,0.55);
        transition: 0.15s;
    }

    .download-btn:active {
        transform: translateY(1px) scale(0.99);
        box-shadow: 0 6px 18px rgba(16,172,132,0.65);
    }

    .close-btn {
        width: 100%;
        padding: 10px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.35);
        background: transparent;
        color: #f5f5f5;
        font-size: 14px;
        cursor: pointer;
        transition: 0.15s;
    }

    .close-btn:hover {
        background: rgba(255,255,255,0.05);
    }

    .error-shake {
        animation: shake 0.35s;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes popIn {
        from { opacity: 0; transform: scale(0.85) translateY(12px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20% { transform: translateX(-6px); }
        40% { transform: translateX(6px); }
        60% { transform: translateX(-4px); }
        80% { transform: translateX(4px); }
    }

    @media (max-width: 480px) {
        .login-box {
            padding: 18px 16px 14px;
            border-radius: 16px;
        }
        .title-area h1 {
            font-size: 22px;
        }
    }
</style>
</head>
<body>

<div class="login-wrapper">
    <div class="title-area">
        <h1>PAT DataCenter</h1>
        <p>ระบบป้องกันไฟล์ด้วยรหัสผ่าน</p>
    </div>

    <div class="login-box" id="loginBox">
        <h2>กรอกรหัสเพื่อเข้าถึงไฟล์</h2>
        <div class="hint">สำหรับผู้รับไฟล์เท่านั้น · โปรดเก็บรหัสผ่านเป็นความลับ</div>

        <div class="field-label">รหัสผ่าน</div>
        <div class="input-wrap">
            <input type="password" id="password" placeholder="ใส่รหัสที่ได้รับจาก PAT">
            <span class="input-icon">🔒</span>
        </div>

        <button class="main-btn" onclick="checkPass()">ยืนยันและดูรายละเอียดไฟล์</button>
    </div>

    <div class="footer">
        Powered by PAT · Secure Link Delivery
    </div>
</div>

<!-- POPUP -->
<div id="popup">
    <div class="popup-box">
        <h3>รายละเอียดไฟล์</h3>

        <div class="info-row">
            <b>Password:</b>
            <span id="infoPass"></span>
        </div>

        <div class="info-row">
            <b>จัดทำโดย:</b>
            <span id="infoAuthor"></span>
        </div>

        <div class="info-row">
            <b>วันที่อัพ:</b>
            <span id="infoDate"></span>
        </div>

        <div class="info-row">
            <b>ลิ้ง:</b>
            <span id="infoLink"></span>
        </div>

        <div class="popup-actions">
            <a id="downloadBtn" href="#" target="_blank">
                <button class="download-btn">ดาวน์โหลดไฟล์</button>
            </a>
            <button class="close-btn" onclick="closePopup()">ปิด</button>
        </div>
    </div>
</div>

<!-- แยก JS ออกไปเป็น 2 ไฟล์ -->
<script src="fileData.js"></script>
<script src="app.js"></script>

</body>
</html>
