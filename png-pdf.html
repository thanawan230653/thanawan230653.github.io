<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PNG to Single PDF</title>

  <!-- jsPDF from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111827;
      color: #e5e7eb;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 900px;
      width: 100%;
      padding: 24px 16px 40px;
    }

    .card {
      background: #020617;
      border-radius: 18px;
      padding: 20px 18px 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      border: 1px solid #1f2937;
    }

    h1 {
      font-size: 1.4rem;
      margin: 0 0 4px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #9ca3af;
      margin-bottom: 16px;
    }

    .field-group {
      margin-bottom: 16px;
    }

    label {
      font-size: 0.85rem;
      color: #9ca3af;
      margin-bottom: 6px;
      display: block;
    }

    input[type="file"] {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px dashed #4b5563;
      background: #020617;
      color: #e5e7eb;
      cursor: pointer;
      font-size: 0.9rem;
    }

    input[type="file"]::file-selector-button {
      padding: 6px 12px;
      margin-right: 10px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 0.85rem;
    }

    button {
      border-radius: 9999px;
      border: none;
      padding: 10px 18px;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #22c55e;
      color: #022c22;
      font-weight: 600;
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .status {
      font-size: 0.85rem;
      margin-top: 8px;
      color: #a5b4fc;
      min-height: 1.2em;
    }

    .warning {
      font-size: 0.8rem;
      color: #fbbf24;
      margin-top: 4px;
    }

    .output {
      margin-top: 20px;
      border-top: 1px solid #1f2937;
      padding-top: 16px;
    }

    .download-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      font-size: 0.9rem;
      padding: 8px 14px;
      border-radius: 9999px;
      border: 1px solid #4b5563;
      text-decoration: none;
      color: #e5e7eb;
      background: #020617;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 640px) {
      .card {
        padding: 16px 12px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>PNG → Single PDF</h1>
      <div class="subtitle">
        Select many <strong>.png</strong> files (100+ supported). Each image will be placed on its own page in one PDF file (A4 size).
      </div>

      <div class="field-group">
        <label for="fileInput">Select PNG files (multiple)</label>
        <input id="fileInput" type="file" accept="image/png" multiple />
        <div id="fileInfo" class="warning"></div>
      </div>

      <button id="convertBtn">
        📄 Convert to PDF
      </button>
      <div id="status" class="status"></div>

      <div class="output">
        <a id="downloadLink" class="download-link hidden" href="#" download="combined.pdf">
          ⬇ Download combined.pdf
        </a>
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const fileInfo = document.getElementById("fileInfo");
    const convertBtn = document.getElementById("convertBtn");
    const statusEl = document.getElementById("status");
    const downloadLink = document.getElementById("downloadLink");

    fileInput.addEventListener("change", () => {
      const files = Array.from(fileInput.files).filter(f => f.type === "image/png");
      if (files.length === 0) {
        fileInfo.textContent = "";
        return;
      }
      fileInfo.textContent =
        `Selected PNG files: ${files.length} file(s). Recommended: ≥ 100 files, but any amount is okay.`;
    });

    convertBtn.addEventListener("click", async () => {
      const files = Array.from(fileInput.files).filter(f => f.type === "image/png");

      if (files.length === 0) {
        alert("Please select at least one PNG file first.");
        return;
      }

      convertBtn.disabled = true;
      downloadLink.classList.add("hidden");
      statusEl.textContent = `Reading ${files.length} image(s)...`;

      try {
        const images = await Promise.all(files.map(loadImageAndData));

        statusEl.textContent = "Generating PDF... (this may take a while for 100+ images)";

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
          orientation: "portrait",
          unit: "mm",
          format: "a4"
        });

        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();

        images.forEach((img, index) => {
          const imgRatio = img.width / img.height;
          const pageRatio = pageWidth / pageHeight;

          let renderWidth;
          let renderHeight;

          if (imgRatio > pageRatio) {
            // Image is relatively wider → fit to page width
            renderWidth = pageWidth;
            renderHeight = renderWidth / imgRatio;
          } else {
            // Image is relatively taller → fit to page height
            renderHeight = pageHeight;
            renderWidth = renderHeight * imgRatio;
          }

          const x = (pageWidth - renderWidth) / 2;
          const y = (pageHeight - renderHeight) / 2;

          pdf.addImage(img.dataURL, "PNG", x, y, renderWidth, renderHeight);

          // Add new page if not the last image
          if (index < images.length - 1) {
            pdf.addPage();
          }
        });

        const pdfBlob = pdf.output("blob");
        const pdfUrl = URL.createObjectURL(pdfBlob);

        downloadLink.href = pdfUrl;
        downloadLink.download = "combined.pdf";
        downloadLink.classList.remove("hidden");

        statusEl.textContent = "Done! Download your PDF file below.";

      } catch (err) {
        console.error(err);
        statusEl.textContent = "Error: " + err.message;
      } finally {
        convertBtn.disabled = false;
      }
    });

    function loadImageAndData(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = (e) => {
          const dataURL = e.target.result;
          const img = new Image();
          img.onload = () => {
            resolve({
              dataURL,
              width: img.width,
              height: img.height
            });
          };
          img.onerror = () => reject(new Error("Failed to load image: " + file.name));
          img.src = dataURL;
        };

        reader.onerror = () => {
          reject(new Error("Failed to read file: " + file.name));
        };

        reader.readAsDataURL(file);
      });
    }
  </script>
</body>
</html>
