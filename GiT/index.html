<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แบบทดสอบ 60 ข้อ - บริหารธุรกิจดิจิทัล</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Main container with a subtle drop shadow and rounded corners -->
  <div class="container">
    <!-- Decorative banner image downloaded from Wikimedia Commons -->
    <img src="img/banner.png" alt="Digital Business Illustration" class="banner">
    <!-- Title and tagline -->
    <h1>แบบทดสอบ 60 ข้อ</h1>
    <p class="tagline">ทดสอบความรู้ในสาขาบริหารธุรกิจดิจิทัลแบบครบถ้วน</p>
    <!-- Start button for beginning the quiz -->
    <button id="startBtn" class="primary-btn">เริ่มทำข้อสอบ</button>
  </div>
  <footer>
    ผู้จัดทำ: Pawarit Sosirikul
  </footer>
  <script>
    // Navigate to quiz page when the user clicks the start button
    document.getElementById('startBtn').addEventListener('click', function () {
      window.location.href = 'quiz.html';
    });
  </script>
</body>
</html>
