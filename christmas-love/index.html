<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#c62828" />
  <title>Christmas Love Quiz</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <!-- Snow layer -->
  <canvas id="snow" aria-hidden="true"></canvas>

  <!-- Music (เล่นได้หลัง user click ครั้งแรก ตามกฎเบราว์เซอร์) -->
  <audio id="bgm" preload="auto" crossorigin="anonymous">
    <source src="https://raw.githubusercontent.com/thanawan230653/poto/refs/heads/main/tot.mp3" type="audio/mpeg">
  </audio>

  <main class="wrap">
    <header class="topbar">
      <div class="brand">
        <span class="dot"></span>
        <span>Christmas Love Quiz</span>
      </div>

      <div class="top-actions">
        <button class="chip" data-action="toggle-snow" type="button">
          <span class="chip-ico">❄️</span><span>Snow</span>
        </button>
        <button class="chip" data-action="toggle-music" type="button">
          <span class="chip-ico">🎵</span><span>Music</span>
        </button>
        <button class="chip" data-action="copy-summary" type="button">
          <span class="chip-ico">📋</span><span>Copy</span>
        </button>
      </div>
    </header>

    <section id="app" class="app" aria-live="polite"></section>

    <footer class="footer">
      <div class="fine">
        ทำขำๆ เอาไว้แคป/คัดลอกส่งให้คนที่ชอบได้เลย — ทุกอย่างทำงานในเบราว์เซอร์บน GitHub Pages
      </div>
      <div class="madeby">จัดทำโดย <b>PAT Studlo</b></div>
    </footer>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
