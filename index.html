<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แนะนำตัว - Thanawan</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('https://png.pngtree.com/thumb_back/fh260/background/20230519/pngtree-animated-waves-video-4k-1920x1080-image_2603301.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
      text-align: center;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      backdrop-filter: blur(2px);
    }

    .profile {
      background: rgba(0, 0, 0, 0.5);
      padding: 40px;
      border-radius: 20px;
      display: inline-block;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 3px solid white;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 32px;
      margin: 10px 0;
    }

    p {
      font-size: 18px;
      margin: 5px 0 20px 0;
    }

    a {
      display: inline-block;
      text-decoration: none;
      color: white;
      background-color: #0078ff;
      padding: 10px 25px;
      border-radius: 25px;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      background-color: #005fcc;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="profile">
    <img src="https://cdn-icons-png.flaticon.com/512/1144/1144760.png" alt="Profile Picture">
    <h1>Thanawan</h1>
    <p>ยินดีต้อนรับเข้าสู่หน้าแนะนำตัวของฉัน</p>
    <a href="https://github.com/thanawan230653" target="_blank">เยี่ยมชม GitHub ของฉัน</a>
  </div>
</body>
</html>
